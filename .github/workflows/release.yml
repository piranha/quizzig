name: CI

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - run: make test

  release-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build release artifacts
        run: make ciall VERSION=${{ github.ref_type == 'tag' && github.ref_name || 'dev' }}

      - uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: zig-out/dist/*

  publish-release:
    runs-on: ubuntu-latest
    needs: release-build
    if: github.ref_type == 'tag'
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: release-artifacts
          path: zig-out/dist

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: zig-out/dist/*
          generate_release_notes: true
